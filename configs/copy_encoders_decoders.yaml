# Copy task: encoder x decoder sweep with a matched information bottleneck |z| = 32.
#
# Run: sfb sweep -c configs/copy_encoders_decoders.yaml
#
# How bottleneck works here (see src/sfb/models/encoders/*.py):
#   - simple_nn, transformer: z_dim = d_bottleneck  -> use d_bottleneck: 32
#   - gru, lstm (n_layers: 1): z_dim = d_bottleneck  -> use d_bottleneck: 32
#   - gru, lstm (n_layers: N): z_dim = N * d_bottleneck -> divide d_bottleneck or use N=1
#   - bigru (n_layers: 1): z_dim = 2 * d_bottleneck  -> use d_bottleneck: 16 for |z|=32
#   - autoencoder: bottleneck_dim (or d_bottleneck) is |z|  -> use 32
#
# d_model stays wider (e.g. 64) for embeddings and decoder width; only z is capped at 32.
#
# Decoder choices: linear | lstm | gru (sfb.models.decoders.DECODER_CHOICES).
# Uncomment target_noise list to mirror copy_all_models noise grid.
#
# Sweep fills missing keys from SWEEP_DEFAULTS (merged defaults from every registered model).
# Set n_layers / n_heads / bottleneck_dim here so rows are not polluted by other models' defaults.

task: copy
loss: cross_entropy
sequence_length: [10, 32, 128]
vocabulary_size: [10, 32,128]
target_noise: 0.0
# target_noise: [0.0, 0.1]
batch_size: 256
steps: 8000
eval_every: 1000
seed: 42

# Early stopping: no "no hope" at step 100 by default; need 3 evals below threshold.
# Set no_hope_threshold: 0 to disable val-acc no-hope entirely (patience still applies).
no_hope_first_eval_at: null
no_hope_after_evals: 3
no_hope_threshold: 0.01

# Shared width: trunk vs bottleneck (per-row entries can override).
d_model: 64
d_bottleneck: 32
n_layers: 1
n_heads: 4
bottleneck_dim: 32

models:
  - model: simple_nn
    decoder: [linear]

  # - model: gru
  #   n_layers: 1
  #   decoder: [gru]

  - model: lstm
    n_layers: 1
    decoder: [lstm]

  # |z| = n_layers * 2 * d_bottleneck -> 1 * 2 * 16 = 32
  - model: bigru
    n_layers: 1
    d_bottleneck: 16
    decoder: [gru]

  - model: transformer
    n_layers: 4
    decoder: [gru]

  - model: autoencoder
    n_layers: 2
