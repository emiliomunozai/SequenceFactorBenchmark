# Copy task: compare encoder families × decoder heads × bottleneck width.
# Run: sfb sweep -c configs/copy_codec_ablation.yaml
#
# Sweep rules (see cli.SWEEP_PARAM_KEYS):
# - Any key listed there can be a scalar (fixed) or a list (grid dimension).
# - `models:` entries merge into shared settings, then each row is expanded.
# - `decoder` must be one of: linear, lstm, gru (see sfb.models.decoders.DECODER_CHOICES).
# - `d_bottleneck` caps the encoder bottleneck; if omitted it defaults to `d_model`.
#
# Metrics: `final_val_acc` / `final_train_acc` in results CSV (token-level accuracy).

task: copy
loss: cross_entropy
sequence_length: 32
vocabulary_size: 64
target_noise: 0.0
batch_size: 64
steps: 3000
eval_every: 500
seed: 42

models:
  # Same encoder backbone, different readout heads
  - model: lstm
    d_model: 64
    d_bottleneck: 32
    n_layers: 1
    decoder: [linear, lstm, gru]

  - model: gru
    d_model: 64
    d_bottleneck: 32
    n_layers: 1
    decoder: [linear, lstm, gru]

  # Tighten / widen bottleneck for one encoder (optional second grid)
  - model: lstm
    d_model: 64
    n_layers: 1
    decoder: linear
    d_bottleneck: [16, 32, 64]
