# Multi model example with explicit encoder/decoder pairs.
# Run: sfb run -c configs/experiment.yaml

task: copy
loss: cross_entropy
sequence_length: [16, 32, 48, 64, 80, 96]
vocabulary_size: [16, 32, 48, 64, 80, 96]
input_noise: [0.0, 0.1, 0.2]
corruption_mode: replace
batch_size: 128
steps: 15000
eval_every: 200
seed: 42
early_stopping: true
patience: 5
no_hope_after_evals: 100
no_hope_threshold: 0.01

models:
  - encoder: mlp
    decoder: mlp

  - encoder: lstm
    decoder: lstm
    n_layers: 2

  - encoder: transformer
    decoder: rnn
    n_layers: 2
    n_heads: 4

d_model: 128
bottleneck_dim: [32, 64, 128]
